<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorem Ipsum Generator</title>

  <meta name="description" content="Generate lorem ipsum placeholder text in Latin, English, and Finnish." />

  <!-- Open Graph -->
  <meta property="og:title" content="Lorem Ipsum Generator" />
  <meta property="og:description" content="Generate placeholder text in Latin, English, and Finnish." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://lorem.jeme.app/" />
  <meta property="og:image" content="https://lorem.jeme.app/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="en_US" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lorem Ipsum Generator" />
  <meta name="twitter:description" content="Generate placeholder text in Latin, English, and Finnish." />
  <meta name="twitter:image" content="https://lorem.jeme.app/og-image.png" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>Lorem Ipsum</h1>
      <p>Generate placeholder text in multiple languages</p>
    </header>

    <div class="card">
      <div class="field">
        <label for="lang">Language</label>
        <select id="lang" onchange="generate()">
          <option value="la">Latin</option>
          <option value="en">English</option>
          <option value="fi">Finnish</option>
        </select>
      </div>
    </div>

    <div class="card output-card">
      <textarea class="output-area" id="output" readonly placeholder="Your generated text will appear here…"></textarea>
      <div class="btn-actions">
        <button class="btn" onclick="copyText()">Copy</button>
        <button class="btn" onclick="generate()">Regenerate</button>
        <span class="copy-feedback" id="copyFeedback">Copied!</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
